<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SammaPix</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #FAFAFA; color: #171717; min-height: 100vh; }

    .header { position: sticky; top: 0; background: #fff; border-bottom: 1px solid #E5E5E5; padding: 14px 16px; z-index: 10; }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .logo { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
    .scan-btn { padding: 6px 14px; background: #171717; color: #fff; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .scan-btn:hover { background: #333; }
    .scan-btn.scanning { background: #6366F1; }
    .stats { display: flex; gap: 12px; font-size: 11px; color: #737373; }
    .stat-num { font-weight: 700; color: #171717; }

    .filters { position: sticky; top: 64px; background: #FAFAFA; padding: 8px 16px; display: none; gap: 6px; flex-wrap: wrap; z-index: 9; border-bottom: 1px solid #E5E5E5; }
    .filter-btn { padding: 4px 10px; border: 1px solid #E5E5E5; background: #fff; border-radius: 6px; font-size: 11px; cursor: pointer; color: #525252; }
    .filter-btn:hover { border-color: #A3A3A3; }
    .filter-btn.active { background: #171717; color: #fff; border-color: #171717; }

    .batch-bar { position: sticky; top: 100px; background: #171717; color: #fff; padding: 8px 16px; display: none; align-items: center; justify-content: space-between; z-index: 8; font-size: 12px; }
    .batch-bar.visible { display: flex; }
    .batch-btn { padding: 5px 10px; background: rgba(255,255,255,0.15); color: #fff; border: none; border-radius: 6px; font-size: 11px; cursor: pointer; font-weight: 500; }
    .batch-btn:hover { background: rgba(255,255,255,0.25); }

    .grid { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .card { background: #fff; border-radius: 10px; overflow: hidden; border: 1px solid #E5E5E5; position: relative; transition: border-color 0.15s; }
    .card:hover { border-color: #A3A3A3; }
    .card.selected { border-color: #6366F1; box-shadow: 0 0 0 2px rgba(99,102,241,0.15); }
    .card-sel { position: absolute; top: 6px; left: 6px; width: 18px; height: 18px; border-radius: 5px; border: 2px solid rgba(255,255,255,0.8); background: rgba(0,0,0,0.3); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; z-index: 2; }
    .card.selected .card-sel { background: #6366F1; border-color: #6366F1; }
    .card-img { height: 90px; background: #F5F5F5; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; }
    .card-img img { max-width: 100%; max-height: 90px; object-fit: contain; }
    .card-info { padding: 6px 8px; }
    .card-meta { display: flex; gap: 3px; margin-bottom: 5px; flex-wrap: wrap; }
    .badge { font-size: 8px; padding: 1px 5px; border-radius: 3px; font-weight: 600; }
    .badge-fmt { background: #E0E7FF; color: #4338CA; }
    .badge-dim { background: #F5F5F5; color: #737373; }
    .card-btns { display: flex; gap: 3px; }
    .card-btn { flex: 1; padding: 4px; border: 1px solid #E5E5E5; background: #fff; border-radius: 5px; font-size: 9px; cursor: pointer; text-align: center; font-weight: 500; color: #525252; }
    .card-btn:hover { background: #F5F5F5; }
    .card-btn.pri { background: #171717; color: #fff; border-color: #171717; }
    .card-btn.pri:hover { background: #333; }

    .empty { text-align: center; padding: 60px 24px; color: #A3A3A3; }
    .empty-icon { font-size: 40px; margin-bottom: 10px; }
    .empty h3 { font-size: 14px; color: #525252; margin-bottom: 6px; }
    .empty p { font-size: 12px; line-height: 1.5; }
    .loading { text-align: center; padding: 40px; color: #A3A3A3; font-size: 13px; }
    .spinner { width: 24px; height: 24px; border: 2px solid #E5E5E5; border-top: 2px solid #171717; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer { padding: 10px 16px; border-top: 1px solid #E5E5E5; background: #fff; text-align: center; }
    .footer a { font-size: 11px; color: #6366F1; text-decoration: none; font-weight: 500; }
    .footer-note { font-size: 9px; color: #A3A3A3; margin-top: 3px; }

    .toast { position: fixed; bottom: 16px; left: 16px; right: 16px; background: #171717; color: #fff; padding: 10px 16px; border-radius: 10px; font-size: 12px; z-index: 100; text-align: center; transition: opacity 0.3s; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-top">
      <span class="logo">SammaPix</span>
      <button class="scan-btn" id="scanBtn">🔍 Scan page</button>
    </div>
    <div class="stats" id="stats" style="display:none">
      <span><span class="stat-num" id="statTotal">0</span> images</span>
      <span><span class="stat-num" id="statFmts">0</span> formats</span>
    </div>
  </div>

  <div class="filters" id="filters"></div>

  <div class="batch-bar" id="batchBar">
    <span id="batchCount">0 selected</span>
    <div style="display:flex;gap:4px">
      <button class="batch-btn" onclick="batchDl('image/jpeg','jpg',0.95)">→JPG</button>
      <button class="batch-btn" onclick="batchDl('image/png','png',1)">→PNG</button>
      <button class="batch-btn" onclick="batchDl('image/webp','webp',0.9)">→WebP</button>
      <button class="batch-btn" onclick="selectedSet.clear();updateUI()">✕</button>
    </div>
  </div>

  <div id="content">
    <div class="loading"><div class="spinner"></div>Scanning page...</div>
  </div>

  <div class="footer">
    <a href="https://www.sammapix.com?ref=ext-panel" target="_blank">All 27 tools on sammapix.com →</a>
    <div class="footer-note">Images never uploaded · 100% client-side</div>
  </div>

  <script>
    let allImages = [];
    let selectedSet = new Set();
    let filter = "all";

    // ═══ SCAN ═══
    async function doScan() {
      const btn = document.getElementById("scanBtn");
      btn.textContent = "⏳ Scanning...";
      btn.classList.add("scanning");
      document.getElementById("content").innerHTML = '<div class="loading"><div class="spinner"></div>Scanning page...</div>';

      try {
        const [tab] = await chrome.tabs.query({ active: true, lastFocusedWindow: true });
        if (!tab || !tab.id) throw new Error("No tab");

        // Inject scan function directly — works even without content script preloaded
        const results = await chrome.scripting.executeScript({
          target: { tabId: tab.id },
          func: () => {
            const imgs = new Map();

            // <img> tags
            document.querySelectorAll("img").forEach(el => {
              const src = el.currentSrc || el.src;
              if (!src || src.length < 10 || src.startsWith("data:image/svg") || imgs.has(src)) return;
              const r = el.getBoundingClientRect();
              if (r.width < 30 && r.height < 30) return;
              imgs.set(src, {
                src,
                w: el.naturalWidth || Math.round(r.width),
                h: el.naturalHeight || Math.round(r.height),
                alt: el.alt || "",
              });
            });

            // CSS background-image
            document.querySelectorAll("*").forEach(el => {
              const bg = getComputedStyle(el).backgroundImage;
              if (!bg || bg === "none") return;
              const m = bg.match(/url\(["']?(https?:\/\/[^"')]+)["']?\)/);
              if (!m || imgs.has(m[1])) return;
              const r = el.getBoundingClientRect();
              if (r.width < 30 && r.height < 30) return;
              imgs.set(m[1], { src: m[1], w: Math.round(r.width), h: Math.round(r.height), alt: "" });
            });

            // <picture> <source>
            document.querySelectorAll("picture source[srcset]").forEach(el => {
              const src = el.srcset.split(",")[0].trim().split(" ")[0];
              if (src && !imgs.has(src)) imgs.set(src, { src, w: 0, h: 0, alt: "" });
            });

            return Array.from(imgs.values());
          },
        });

        allImages = (results[0]?.result || []).map(img => ({
          ...img,
          fmt: guessFmt(img.src),
        }));

        selectedSet.clear();
        filter = "all";
        updateUI();

      } catch (err) {
        document.getElementById("content").innerHTML =
          '<div class="empty"><div class="empty-icon">⚠️</div><h3>Can\'t scan this page</h3><p>Refresh the page and try again.<br>Some pages (chrome://, extensions) can\'t be scanned.</p></div>';
      }

      btn.textContent = "🔍 Rescan";
      btn.classList.remove("scanning");
    }

    function guessFmt(url) {
      const u = url.split("?")[0].toLowerCase();
      if (u.endsWith(".webp") || url.includes("format=webp") || url.includes("fm=webp")) return "WebP";
      if (u.endsWith(".png") || url.startsWith("data:image/png")) return "PNG";
      if (u.endsWith(".jpg") || u.endsWith(".jpeg") || url.startsWith("data:image/jpeg")) return "JPG";
      if (u.endsWith(".gif")) return "GIF";
      if (u.endsWith(".svg") || url.startsWith("data:image/svg")) return "SVG";
      if (u.endsWith(".avif") || url.includes("format=avif")) return "AVIF";
      return "IMG";
    }

    // ═══ UI ═══
    function updateUI() {
      // Stats
      document.getElementById("statTotal").textContent = allImages.length;
      const fmts = [...new Set(allImages.map(i => i.fmt))];
      document.getElementById("statFmts").textContent = fmts.length;
      document.getElementById("stats").style.display = allImages.length > 0 ? "flex" : "none";

      // Filters
      const filtersEl = document.getElementById("filters");
      if (allImages.length > 0) {
        filtersEl.style.display = "flex";
        const counts = { all: allImages.length };
        allImages.forEach(i => { counts[i.fmt] = (counts[i.fmt] || 0) + 1; });
        filtersEl.innerHTML = Object.entries(counts).map(([f, c]) =>
          `<button class="filter-btn${filter === f ? ' active' : ''}" onclick="filter='${f}';updateUI()">${f === 'all' ? 'All' : f} (${c})</button>`
        ).join("");
      } else {
        filtersEl.style.display = "none";
      }

      // Batch bar
      const bb = document.getElementById("batchBar");
      bb.classList.toggle("visible", selectedSet.size > 0);
      document.getElementById("batchCount").textContent = selectedSet.size + " selected";

      // Grid
      const filtered = filter === "all" ? allImages : allImages.filter(i => i.fmt === filter);
      const content = document.getElementById("content");

      if (filtered.length === 0) {
        content.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><h3>No images found</h3><p>Try a different filter or scan another page.</p></div>';
        return;
      }

      let html = '<div class="grid">';
      for (const img of filtered) {
        const sel = selectedSet.has(img.src);
        const dim = img.w && img.h ? `${img.w}×${img.h}` : "";
        html += `
          <div class="card${sel ? ' selected' : ''}" data-src="${esc(img.src)}">
            <div class="card-sel" onclick="event.stopPropagation();toggleSel('${esc(img.src)}')">${sel ? '✓' : ''}</div>
            <div class="card-img"><img src="${img.src}" loading="lazy" onerror="this.parentElement.innerHTML='🖼️'" /></div>
            <div class="card-info">
              <div class="card-meta">
                <span class="badge badge-fmt">${img.fmt}</span>
                ${dim ? `<span class="badge badge-dim">${dim}</span>` : ''}
              </div>
              <div class="card-btns">
                <button class="card-btn pri" onclick="dl('${esc(img.src)}','image/jpeg','jpg',0.95)">JPG</button>
                <button class="card-btn" onclick="dl('${esc(img.src)}','image/png','png',1)">PNG</button>
                <button class="card-btn" onclick="dl('${esc(img.src)}','image/webp','webp',0.9)">WebP</button>
              </div>
            </div>
          </div>`;
      }
      html += '</div>';
      content.innerHTML = html;
    }

    function esc(s) { return s.replace(/'/g, "\\'").replace(/"/g, "&quot;"); }

    function toggleSel(src) {
      if (selectedSet.has(src)) selectedSet.delete(src);
      else selectedSet.add(src);
      updateUI();
    }

    // ═══ DOWNLOAD ═══
    function dl(src, mime, ext, q) {
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => {
        const c = document.createElement("canvas");
        c.width = img.naturalWidth; c.height = img.naturalHeight;
        c.getContext("2d").drawImage(img, 0, 0);
        c.toBlob(blob => {
          if (!blob) { toast("⚠️ CORS — can't process this image"); return; }
          const u = URL.createObjectURL(blob);
          let fn = "image";
          try { const b = new URL(src).pathname.split("/").pop().split(".")[0].replace(/[^a-zA-Z0-9_-]/g,""); if(b&&b.length>0&&b.length<80)fn=b; } catch{}
          const a = document.createElement("a");
          a.href = u; a.download = `${fn}.${ext}`;
          document.body.appendChild(a); a.click(); a.remove();
          setTimeout(() => URL.revokeObjectURL(u), 5000);
          toast(`✅ Saved as ${ext.toUpperCase()} — EXIF removed`);
        }, mime, q);
      };
      img.onerror = () => toast("⚠️ Can't load image (CORS)");
      img.src = src;
    }

    async function batchDl(mime, ext, q) {
      const srcs = [...selectedSet];
      toast(`⏳ Converting ${srcs.length} images...`);
      for (const src of srcs) {
        dl(src, mime, ext, q);
        await new Promise(r => setTimeout(r, 600));
      }
    }

    function toast(msg) {
      const existing = document.querySelector(".toast");
      if (existing) existing.remove();
      const t = document.createElement("div");
      t.className = "toast";
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => { t.style.opacity = "0"; setTimeout(() => t.remove(), 300); }, 3000);
    }

    // ═══ INIT ═══
    document.getElementById("scanBtn").addEventListener("click", doScan);
    // Auto-scan after short delay
    setTimeout(doScan, 300);
  </script>
</body>
</html>
