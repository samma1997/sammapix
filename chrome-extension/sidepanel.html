<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SammaPix</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display',system-ui,sans-serif;background:#f2f2f7;color:#1c1c1e;-webkit-font-smoothing:antialiased}

/* ═══ HEADER — frosted glass ═══ */
.hdr{background:rgba(28,28,30,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);color:#fff;padding:16px 16px 14px}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-icon{width:28px;height:28px;flex-shrink:0}
.logo-text{font-size:16px;font-weight:700;letter-spacing:-.4px}
.hdr-badge{font-size:10px;padding:3px 8px;background:rgba(255,255,255,.12);border-radius:12px;color:rgba(255,255,255,.6);font-weight:500}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-sub{font-size:12px;color:rgba(255,255,255,.5);margin-top:6px;display:flex;align-items:center;gap:8px}
.hdr-sub b{color:#fff;font-weight:600}
.rescan-btn{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:11px;padding:4px 12px;border-radius:14px;cursor:pointer;font-weight:500;transition:all .2s}
.rescan-btn:hover{background:rgba(255,255,255,.25)}
.rescan-btn:active{transform:scale(.95)}

/* ═══ USER AVATAR ═══ */
.user-avatar{width:26px;height:26px;border-radius:50%;border:2px solid rgba(255,255,255,.3);cursor:pointer;transition:all .2s;object-fit:cover}
.user-avatar:hover{border-color:rgba(255,255,255,.6)}
.user-info-popup{position:absolute;top:58px;right:12px;background:rgba(28,28,30,.96);backdrop-filter:blur(20px);border-radius:14px;padding:14px;z-index:50;min-width:200px;box-shadow:0 8px 32px rgba(0,0,0,.3);display:none}
.user-info-popup.on{display:block}
.user-info-email{font-size:12px;color:rgba(255,255,255,.7);margin-bottom:10px;word-break:break-all}
.user-info-name{font-size:13px;color:#fff;font-weight:600;margin-bottom:4px}
.signout-btn{width:100%;padding:8px;background:rgba(255,59,48,.15);color:#ff3b30;border:none;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.signout-btn:hover{background:rgba(255,59,48,.25)}

/* ═══ TABS — iOS segmented control ═══ */
.seg{position:sticky;top:0;z-index:19;background:rgba(242,242,247,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:10px 12px;border-bottom:1px solid rgba(0,0,0,.06)}
.seg-inner{display:flex;background:rgba(118,118,128,.12);border-radius:9px;padding:2px}
.seg-btn{flex:1;padding:7px 4px;text-align:center;font-size:11px;font-weight:500;color:#8e8e93;cursor:pointer;border-radius:7px;transition:all .25s;user-select:none;border:none;background:none}
.seg-btn:active{transform:scale(.97)}
.seg-btn.on{background:#fff;color:#1c1c1e;font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.08),0 0 1px rgba(0,0,0,.04)}

/* ═══ FILTERS ═══ */
.fbar{padding:8px 12px;display:flex;gap:6px;flex-wrap:wrap;background:transparent}
.fb{padding:5px 12px;border:none;background:rgba(118,118,128,.12);border-radius:16px;font-size:11px;cursor:pointer;color:#8e8e93;transition:all .2s;font-weight:500}
.fb:hover{background:rgba(118,118,128,.18)}
.fb.on{background:#1c1c1e;color:#fff}

/* ═══ GRID ═══ */
.grid{padding:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.card{background:#fff;border-radius:14px;overflow:hidden;border:none;position:relative;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:all .2s;animation:pop .35s ease both}
@keyframes pop{from{opacity:0;transform:scale(.93) translateY(8px)}to{opacity:1;transform:none}}
.card:hover{box-shadow:0 2px 12px rgba(0,0,0,.1);transform:translateY(-1px)}
.card.sel{box-shadow:0 0 0 2.5px #6366f1,0 2px 12px rgba(99,102,241,.2)}
.ck{position:absolute;top:6px;left:6px;width:22px;height:22px;border-radius:12px;border:2px solid rgba(255,255,255,.9);background:rgba(0,0,0,.25);backdrop-filter:blur(8px);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;z-index:2;transition:all .2s}
.ck:active{transform:scale(.9)}
.card.sel .ck{background:#6366f1;border-color:#6366f1}
.cimg{height:90px;background:#f2f2f7;display:flex;align-items:center;justify-content:center;overflow:hidden}
.cimg img{max-width:100%;max-height:90px;object-fit:cover;transition:transform .3s}
.card:hover .cimg img{transform:scale(1.05)}
.ci{padding:8px 10px}
.cm{display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap}
.bg{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600;letter-spacing:.02em}
.bg-f{background:#eef2ff;color:#4f46e5}
.bg-d{background:#f2f2f7;color:#8e8e93}
.cbs{display:flex;gap:4px}
.cbb{flex:1;padding:6px;border:none;background:#f2f2f7;border-radius:8px;font-size:10px;cursor:pointer;text-align:center;font-weight:600;color:#1c1c1e;transition:all .15s}
.cbb:hover{background:#e5e5ea}
.cbb:active{transform:scale(.95)}
.cbb.p{background:#1c1c1e;color:#fff}
.cbb.p:hover{background:#3a3a3c}

/* ═══ BATCH ═══ */
.batch{position:sticky;top:52px;background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff;padding:10px 14px;display:none;align-items:center;justify-content:space-between;z-index:18;font-size:12px;font-weight:500;border-radius:12px;margin:6px 10px 0;box-shadow:0 4px 16px rgba(99,102,241,.35),0 1px 3px rgba(0,0,0,.1)}
.batch.on{display:flex}
.batch-spacer{height:8px}
.fb-selall{padding:5px 12px;border:none;background:#6366f1;border-radius:16px;font-size:11px;cursor:pointer;color:#fff;transition:all .2s;font-weight:600;margin-left:auto}
.fb-selall:hover{background:#4f46e5}
.fb-selall:active{transform:scale(.95)}
.bb{padding:5px 12px;background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:8px;font-size:11px;cursor:pointer;font-weight:600;transition:all .15s}
.bb:hover{background:rgba(255,255,255,.3)}
.bb:active{transform:scale(.95)}

/* ═══ EXIF TAB ═══ */
.elist{padding:10px}
.ecard{background:#fff;border-radius:14px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);animation:pop .35s ease both}
.etop{display:flex;align-items:center;gap:10px;padding:12px}
.eth{width:48px;height:48px;border-radius:10px;object-fit:cover;background:#f2f2f7}
.einfo{flex:1;min-width:0}
.ename{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#1c1c1e}
.edet{font-size:11px;color:#8e8e93;margin-top:2px}
/* EXIF data grid */
.exif-data{padding:0 12px 10px;display:grid;grid-template-columns:1fr 1fr;gap:4px}
.exif-item{display:flex;align-items:center;gap:6px;padding:5px 8px;background:#f2f2f7;border-radius:8px;font-size:10px}
.exif-icon{font-size:12px;flex-shrink:0}
.exif-label{color:#8e8e93;font-weight:500}
.exif-val{color:#1c1c1e;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exif-warn{display:flex;align-items:center;gap:6px;margin:0 12px 8px;padding:8px 10px;background:#fff3cd;border-radius:10px;font-size:11px;color:#856404;font-weight:500}
.exif-safe{display:flex;align-items:center;gap:6px;margin:0 12px 8px;padding:8px 10px;background:#d1fae5;border-radius:10px;font-size:11px;color:#065f46;font-weight:500}
.exif-none{display:flex;align-items:center;gap:6px;margin:0 12px 8px;padding:8px 10px;background:#f0fdf4;border-radius:10px;font-size:11px;color:#16a34a;font-weight:500}
.ebtn{width:calc(100% - 24px);margin:0 12px 12px;padding:10px;background:#1c1c1e;color:#fff;border:none;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.ebtn:hover{background:#3a3a3c}
.ebtn:active{transform:scale(.98)}
.ebtn.done{background:#34c759}
.exif-removed{text-decoration:line-through;color:#ae3b3b;opacity:.5}

/* ═══ COMPRESS TAB ═══ */
.clist{padding:10px}
.ccard{background:#fff;border-radius:14px;margin-bottom:8px;padding:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);animation:pop .35s ease both}
.crow{display:flex;align-items:center;gap:10px}
.cthu{width:48px;height:48px;border-radius:10px;object-fit:cover;background:#f2f2f7}
.cinf{flex:1;min-width:0}
.cnm{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.csz{font-size:11px;color:#8e8e93;margin-top:2px}
.cbtn{padding:8px 16px;background:#1c1c1e;color:#fff;border:none;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.cbtn:hover{background:#3a3a3c}
.cbtn:active{transform:scale(.95)}
.cbtn.done{background:#34c759}
.cres{margin-top:8px;padding:8px 10px;background:#d1fae5;border-radius:10px;font-size:11px;color:#065f46;font-weight:500;display:none}

/* ═══ AI SORT TAB ═══ */
.ai-header{padding:12px;display:flex;flex-direction:column;gap:10px}
.ai-actions{display:flex;gap:8px;align-items:center}
.ai-categorize-btn{flex:1;padding:10px 16px;background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff;border:none;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.ai-categorize-btn:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 4px 16px rgba(99,102,241,.35)}
.ai-categorize-btn:active{transform:scale(.97)}
.ai-categorize-btn:disabled{opacity:.5;cursor:default;transform:none;filter:none;box-shadow:none}
.ai-dl-cat-btn{padding:10px 14px;background:#1c1c1e;color:#fff;border:none;border-radius:12px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.ai-dl-cat-btn:hover{background:#3a3a3c}
.ai-dl-cat-btn:active{transform:scale(.95)}
.ai-dl-cat-btn:disabled{opacity:.4;cursor:default}

/* AI progress */
.ai-progress{width:100%;height:4px;background:rgba(118,118,128,.12);border-radius:4px;overflow:hidden;display:none}
.ai-progress.on{display:block}
.ai-progress-fill{height:100%;background:linear-gradient(90deg,#6366f1,#818cf8);border-radius:4px;transition:width .3s ease;width:0}
.ai-progress-text{font-size:11px;color:#8e8e93;text-align:center;margin-top:4px;display:none}
.ai-progress-text.on{display:block}

/* Category filter bar */
.cat-fbar{padding:8px 12px;display:flex;gap:5px;flex-wrap:wrap;background:transparent}
.cat-fb{padding:4px 10px;border:none;border-radius:14px;font-size:10px;cursor:pointer;font-weight:600;transition:all .2s;display:flex;align-items:center;gap:4px}
.cat-fb .cat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.cat-fb.off{background:rgba(118,118,128,.08);color:#8e8e93}
.cat-fb.off:hover{background:rgba(118,118,128,.15)}
.cat-fb.on{color:#fff}

/* Category tag on cards */
.cat-tag{font-size:8px;padding:2px 7px;border-radius:8px;font-weight:700;letter-spacing:.03em;color:#fff;text-transform:uppercase}

/* AI Sort grid */
.ai-grid{padding:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ai-card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:all .2s;animation:pop .35s ease both}
.ai-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.1);transform:translateY(-1px)}
.ai-card .cimg{height:90px;background:#f2f2f7;display:flex;align-items:center;justify-content:center;overflow:hidden}
.ai-card .cimg img{max-width:100%;max-height:90px;object-fit:cover;transition:transform .3s}
.ai-card:hover .cimg img{transform:scale(1.05)}
.ai-card-info{padding:8px 10px}
.ai-card-name{font-size:10px;font-weight:500;color:#8e8e93;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px}
.ai-card-tags{display:flex;gap:4px;flex-wrap:wrap}
.ai-card-dim{font-size:9px;color:#a3a3a3;margin-top:4px}
.ai-card-aitags{font-size:9px;color:#8e8e93;margin-top:3px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ai-sparkle{font-size:8px;margin-right:1px}
.cat-confidence{font-weight:400;opacity:.8;font-size:7px}

/* Google Sign-In */
.signin-container{padding:40px 24px;text-align:center}
.signin-container h3{font-size:15px;font-weight:600;color:#1c1c1e;margin-bottom:6px}
.signin-container p{font-size:12px;color:#8e8e93;line-height:1.6;margin-bottom:20px}
.google-signin-btn{display:inline-flex;align-items:center;gap:10px;padding:12px 24px;background:#fff;border:1px solid #dadce0;border-radius:12px;font-size:13px;font-weight:500;color:#3c4043;cursor:pointer;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.google-signin-btn:hover{background:#f8f9fa;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.google-signin-btn:active{transform:scale(.97)}
.google-signin-btn svg{flex-shrink:0}
.signin-skip{display:block;margin-top:14px;font-size:11px;color:#8e8e93;cursor:pointer;border:none;background:none;text-decoration:underline}
.signin-skip:hover{color:#6b7280}

/* ═══ STATES ═══ */
.empty{text-align:center;padding:60px 24px;color:#8e8e93}
.empty-i{font-size:44px;margin-bottom:12px}
.empty h3{font-size:15px;color:#1c1c1e;margin-bottom:6px;font-weight:600}
.empty p{font-size:12px;line-height:1.6;color:#8e8e93}
.scan-btn{display:inline-block;margin-top:16px;padding:12px 28px;background:#1c1c1e;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.scan-btn:hover{background:#3a3a3c}
.scan-btn:active{transform:scale(.96)}
.scanning{text-align:center;padding:48px;color:#8e8e93}
.scan-anim{width:28px;height:28px;border:2.5px solid #e5e5ea;border-top:2.5px solid #1c1c1e;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

.err-box{margin:12px;padding:16px;background:#fef2f2;border:none;border-radius:14px;font-size:12px;color:#991b1b;line-height:1.5}

.toast{position:fixed;bottom:14px;left:14px;right:14px;background:rgba(28,28,30,.92);backdrop-filter:blur(20px);color:#fff;padding:12px 16px;border-radius:14px;font-size:12px;z-index:100;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.12);font-weight:500;animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.ftr{padding:14px 16px;border-top:1px solid rgba(0,0,0,.06);background:#fff;text-align:center}
.ftr a{font-size:11px;color:#6366f1;text-decoration:none;font-weight:600}
.ftr-n{font-size:10px;color:#8e8e93;margin-top:3px}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-row">
    <div class="logo-wrap"><svg class="logo-icon" viewBox="0 0 20 20" width="28" height="28"><rect x="2" y="2" width="3" height="3" fill="#fff" rx="0.5"/><rect x="6" y="2" width="3" height="3" fill="#fff" rx="0.5"/><rect x="10" y="2" width="3" height="3" fill="#fff" rx="0.5"/><rect x="14" y="2" width="3" height="3" fill="#fff" rx="0.5"/><rect x="2" y="6" width="3" height="3" fill="#fff" rx="0.5"/><rect x="14" y="6" width="3" height="3" fill="#fff" rx="0.5"/><rect x="2" y="10" width="3" height="3" fill="#fff" rx="0.5"/><rect x="14" y="10" width="3" height="3" fill="#fff" rx="0.5"/><rect x="2" y="14" width="3" height="3" fill="#fff" rx="0.5"/><rect x="6" y="14" width="3" height="3" fill="#fff" rx="0.5"/><rect x="10" y="14" width="3" height="3" fill="#fff" rx="0.5"/><rect x="14" y="14" width="3" height="3" fill="#fff" rx="0.5"/><rect x="6" y="6" width="3" height="3" fill="#fff" rx="0.5"/><rect x="10" y="6" width="3" height="3" fill="#fff" rx="0.5"/><rect x="6" y="10" width="3" height="3" fill="#fff" rx="0.5"/><rect x="10" y="10" width="3" height="3" fill="#fff" rx="0.5"/></svg><span class="logo-text">SammaPix</span></div>
    <div class="hdr-right">
      <span class="hdr-badge">v4.0</span>
      <div id="user-area"></div>
    </div>
  </div>
  <div class="hdr-sub" id="hcount"></div>
</div>
<div id="user-popup" class="user-info-popup"></div>
<div class="seg">
  <div class="seg-inner">
    <button class="seg-btn on" id="tab-dl">Download</button>
    <button class="seg-btn" id="tab-exif">EXIF/GPS</button>
    <button class="seg-btn" id="tab-comp">Compress</button>
    <button class="seg-btn" id="tab-ai">AI Sort</button>
  </div>
</div>
<div id="v-dl">
  <div class="fbar" id="fbar" style="display:none"></div>
  <div class="batch" id="bat"><span id="batc">0</span><div style="display:flex;gap:4px"><button class="bb" id="b-jpg">JPG</button><button class="bb" id="b-png">PNG</button><button class="bb" id="b-webp">WebP</button><button class="bb" id="b-clr">Clear</button></div></div>
  <div id="gw">
    <div class="empty">
      <div class="empty-i">&#x1F4F7;</div>
      <h3>Scan any webpage</h3>
      <p>Find, download, compress and clean<br>all images on the current page.</p>
      <button class="scan-btn" id="scan-main">Scan This Page</button>
    </div>
  </div>
</div>
<div id="v-exif" style="display:none"></div>
<div id="v-comp" style="display:none"></div>
<div id="v-ai" style="display:none"></div>
<div class="ftr">
  <a href="https://www.sammapix.com?ref=ext" target="_blank">sammapix.com — 27 free tools</a>
  <div class="ftr-n">100% client-side — images never leave your device</div>
</div>
<script src="sidepanel.js"></script>
</body>
