<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SammaPix</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #171717;
    }

    .header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid #E5E5E5;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header p {
      font-size: 11px;
      color: #737373;
      margin-top: 2px;
    }

    .tools {
      padding: 8px;
    }

    .tool-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      border: none;
      background: none;
      border-radius: 8px;
      cursor: pointer;
      text-align: left;
      font-size: 13px;
      color: #171717;
      transition: background 0.15s;
    }

    .tool-btn:hover {
      background: #F5F5F5;
    }

    .tool-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .tool-icon.compress { background: #DBEAFE; }
    .tool-icon.resize { background: #D1FAE5; }
    .tool-icon.convert { background: #FEF3C7; }
    .tool-icon.removebg { background: #EDE9FE; }
    .tool-icon.exif { background: #FEE2E2; }
    .tool-icon.passport { background: #E0E7FF; }

    .tool-name {
      font-weight: 500;
    }

    .tool-desc {
      font-size: 11px;
      color: #A3A3A3;
      margin-top: 1px;
    }

    .divider {
      height: 1px;
      background: #E5E5E5;
      margin: 4px 16px;
    }

    .footer {
      padding: 8px 16px 12px;
      text-align: center;
    }

    .footer a {
      font-size: 11px;
      color: #6366F1;
      text-decoration: none;
      font-weight: 500;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    .badge {
      display: inline-block;
      font-size: 9px;
      padding: 1px 6px;
      border-radius: 4px;
      background: #F0FDF4;
      color: #16A34A;
      font-weight: 600;
      margin-left: 6px;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>SammaPix <span class="badge">FREE</span></h1>
    <p>27 image tools — 100% in your browser, nothing uploaded</p>
  </div>

  <div class="tools">
    <button class="tool-btn" data-url="/tools/compress">
      <div class="tool-icon compress">📦</div>
      <div>
        <div class="tool-name">Compress</div>
        <div class="tool-desc">Reduce file size without quality loss</div>
      </div>
    </button>

    <button class="tool-btn" data-url="/tools/resizepack">
      <div class="tool-icon resize">📐</div>
      <div>
        <div class="tool-name">Resize</div>
        <div class="tool-desc">Resize for any platform (Instagram, LinkedIn...)</div>
      </div>
    </button>

    <button class="tool-btn" data-url="/tools/webp">
      <div class="tool-icon convert">🔄</div>
      <div>
        <div class="tool-name">Convert to WebP</div>
        <div class="tool-desc">Save 25-35% more than JPEG</div>
      </div>
    </button>

    <button class="tool-btn" data-url="/tools/remove-bg">
      <div class="tool-icon removebg">✂️</div>
      <div>
        <div class="tool-name">Remove Background</div>
        <div class="tool-desc">AI-powered, runs locally in your browser</div>
      </div>
    </button>

    <button class="tool-btn" data-url="/tools/exif">
      <div class="tool-icon exif">🛡️</div>
      <div>
        <div class="tool-name">Strip EXIF / GPS</div>
        <div class="tool-desc">Remove location data before sharing</div>
      </div>
    </button>

    <button class="tool-btn" data-url="/tools/passport-photo">
      <div class="tool-icon passport">📸</div>
      <div>
        <div class="tool-name">Passport Photo</div>
        <div class="tool-desc">Compliant photos for 140+ countries</div>
      </div>
    </button>
  </div>

  <div class="divider"></div>

  <div class="footer">
    <a href="https://www.sammapix.com" target="_blank">Open all 27 tools →</a>
  </div>

  <script>
    const BASE = "https://www.sammapix.com";

    document.querySelectorAll(".tool-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const path = btn.dataset.url;
        chrome.tabs.create({ url: `${BASE}${path}?ref=chrome-extension` });
      });
    });
  </script>
</body>
</html>
