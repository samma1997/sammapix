<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" width="20" height="20">
  <!-- 4x4 pixel grid, outer ring -->
  <rect x="2"  y="2"  width="3" height="3" fill="#171717" rx="0.5"/>
  <rect x="6"  y="2"  width="3" height="3" fill="#171717" rx="0.5"/>
  <rect x="10" y="2"  width="3" height="3" fill="#171717" rx="0.5"/>
  <rect x="14" y="2"  width="3" height="3" fill="#171717" rx="0.5"/>
  <rect x="2"  y="6"  width="3" height="3" fill="#171717" rx="0.5"/>
  <rect x="14" y="6"  width="3" height="3" fill="#171717" rx="0.5"/>
  <rect x="2"  y="10" width="3" height="3" fill="#171717" rx="0.5"/>
  <rect x="14" y="10" width="3" height="3" fill="#171717" rx="0.5"/>
  <rect x="2"  y="14" width="3" height="3" fill="#171717" rx="0.5"/>
  <rect x="6"  y="14" width="3" height="3" fill="#171717" rx="0.5"/>
  <rect x="10" y="14" width="3" height="3" fill="#171717" rx="0.5"/>
