  <!-- inner 2x2 -->
  <rect x="6"  y="6"  width="3" height="3" fill="#171717" rx="0.5"/>
  <rect x="10" y="6"  width="3" height="3" fill="#171717" rx="0.5"/>
  <rect x="6"  y="10" width="3" height="3" fill="#171717" rx="0.5"/>
  <rect x="10" y="10" width="3" height="3" fill="#171717" rx="0.5"/>
