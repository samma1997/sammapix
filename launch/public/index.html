<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SammaPix — Launch Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --bg2: #111111;
      --bg3: #181818;
      --bg4: #222222;
      --border: #2a2a2a;
      --border2: #333333;
      --text: #e8e8e8;
      --text2: #999999;
      --text3: #555555;
      --accent: #6366f1;
      --accent-dim: rgba(99,102,241,0.15);
      --accent-glow: rgba(99,102,241,0.3);
      --high: #ef4444;
      --high-dim: rgba(239,68,68,0.12);
      --med: #f59e0b;
      --med-dim: rgba(245,158,11,0.12);
      --low: #6b7280;
      --low-dim: rgba(107,114,128,0.1);
      --green: #22c55e;
      --green-dim: rgba(34,197,94,0.12);
      --radius: 10px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 20px;
      height: 60px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .logo-mark {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent), #818cf8);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 800;
      color: white;
      letter-spacing: -1px;
      flex-shrink: 0;
    }
    .logo-text {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    .logo-sub {
      font-size: 11px;
      color: var(--text3);
      font-weight: 400;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .header-stats {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .stat {
      text-align: right;
    }
    .stat-num {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }
    .stat-label {
      font-size: 10px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .progress-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 140px;
    }
    .progress-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .progress-label { font-size: 11px; color: var(--text3); }
    .progress-pct { font-size: 11px; font-weight: 600; color: var(--accent); }
    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #818cf8);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* ── MAIN ── */
    .main {
      max-width: 900px;
      margin: 0 auto;
      padding: 28px 24px 80px;
    }

    /* ── RESEARCH PANEL ── */
    .research-panel {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 28px;
    }
    .research-top {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .btn-research {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: -0.2px;
    }
    .btn-research:hover {
      background: #4f52d4;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px var(--accent-glow);
    }
    .btn-research:active { transform: translateY(0); }
    .btn-research:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .btn-icon { font-size: 15px; }
    .research-meta {
      font-size: 12px;
      color: var(--text3);
    }
    .research-meta span { color: var(--text2); }
    .research-cron {
      margin-left: auto;
      font-size: 11px;
      color: var(--text3);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .cron-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .terminal {
      display: none;
      margin-top: 16px;
      background: #050505;
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      padding: 14px 16px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 12px;
      line-height: 1.7;
      max-height: 240px;
      overflow-y: auto;
      color: #a8e6cf;
    }
    .terminal.visible { display: block; }
    .terminal-line { white-space: pre-wrap; word-break: break-all; }
    .terminal-line.err { color: #ff8a80; }
    .terminal-line.done { color: #6366f1; font-weight: 600; }

    /* ── WEEK SECTIONS ── */
    .week-section {
      margin-bottom: 20px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .week-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .week-header:hover { background: var(--bg3); }

    .week-chevron {
      color: var(--text3);
      font-size: 12px;
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .week-section.collapsed .week-chevron { transform: rotate(-90deg); }

    .week-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.2px;
    }
    .week-dates {
      font-size: 12px;
      color: var(--text3);
    }
    .week-progress {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .week-count {
      font-size: 12px;
      color: var(--text3);
    }
    .week-count b { color: var(--text2); }
    .week-mini-bar {
      width: 60px;
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .week-mini-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.3s;
    }

    .week-body {
      border-top: 1px solid var(--border);
    }
    .week-section.collapsed .week-body { display: none; }

    /* ── TASK ITEM ── */
    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      position: relative;
    }
    .task-item:last-child { border-bottom: none; }
    .task-item:hover { background: var(--bg3); }
    .task-item.done-item { opacity: 0.4; }

    .task-check {
      flex-shrink: 0;
      margin-top: 1px;
      width: 18px;
      height: 18px;
      border: 1.5px solid var(--border2);
      border-radius: 5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      background: var(--bg);
    }
    .task-check:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .task-check.checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    .task-check.checked::after {
      content: '';
      display: block;
      width: 5px;
      height: 9px;
      border: 2px solid white;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
    }

    .task-body {
      flex: 1;
      min-width: 0;
    }
    .task-top {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 3px;
    }
    .priority-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .priority-dot.high { background: var(--high); }
    .priority-dot.medium { background: var(--med); }
    .priority-dot.low { background: var(--low); }

    .task-platform {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.2px;
      transition: color 0.15s;
    }
    .task-platform:hover { color: var(--accent); }
    .done-item .task-platform { text-decoration: line-through; }

    .priority-badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .priority-badge.high {
      color: var(--high);
      background: var(--high-dim);
    }
    .priority-badge.medium {
      color: var(--med);
      background: var(--med-dim);
    }
    .priority-badge.low {
      color: var(--low);
      background: var(--low-dim);
    }

    .task-timing {
      font-size: 11px;
      color: var(--text3);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .task-timing::before {
      content: '';
      display: inline-block;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--text3);
    }

    .task-notes {
      font-size: 12px;
      color: var(--text3);
      font-style: italic;
      margin-top: 4px;
      line-height: 1.5;
    }

    .task-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 7px;
    }
    .btn-copy {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--bg4);
      border: 1px solid var(--border2);
      color: var(--text2);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-copy:hover {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }
    .btn-copy.copied {
      background: var(--green-dim);
      border-color: var(--green);
      color: var(--green);
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--text3);
      font-size: 13px;
    }

    /* ── FOOTER ── */
    .footer {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    .footer-text {
      font-size: 11px;
      color: var(--text3);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .footer-link {
      color: var(--text3);
      text-decoration: none;
    }
    .footer-link:hover { color: var(--text2); }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--text);
      font-size: 13px;
      padding: 10px 16px;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.25s ease;
      z-index: 1000;
    }
    .toast.visible {
      transform: translateY(0);
      opacity: 1;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text3); }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <a href="https://sammapix.com" target="_blank" class="logo">
      <div class="logo-mark">S</div>
      <div>
        <div class="logo-text">SammaPix</div>
        <div class="logo-sub">Launch Dashboard</div>
      </div>
    </a>
    <div class="header-stats">
      <div class="stat">
        <div class="stat-num" id="stat-done">0</div>
        <div class="stat-label">Completati</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="stat-total">0</div>
        <div class="stat-label">Totale</div>
      </div>
      <div class="progress-wrap">
        <div class="progress-top">
          <span class="progress-label">Progresso</span>
          <span class="progress-pct" id="progress-pct">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- MAIN -->
<main class="main">

  <!-- Research panel -->
  <div class="research-panel">
    <div class="research-top">
      <button class="btn-research" id="btn-research" onclick="runResearch()">
        <span class="btn-icon">&#9881;</span>
        Cerca nuove piattaforme
      </button>
      <div class="research-meta">
        Ultima ricerca: <span id="last-research">mai</span>
      </div>
      <div class="research-cron">
        <div class="cron-dot"></div>
        Auto ogni domenica alle 7:00
      </div>
    </div>
    <div class="terminal" id="terminal"></div>
  </div>

  <!-- Weeks -->
  <div id="weeks-container"></div>

</main>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-text">
    &#9679; Ricerca automatica ogni domenica alle 7:00
  </div>
  <div class="footer-text">
    <a href="https://sammapix.com" target="_blank" class="footer-link">sammapix.com</a>
  </div>
</footer>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  let tasksData = null;

  // ── Load & render ───────────────────────────────────────────────────────────
  async function loadTasks() {
    const res = await fetch('/api/tasks');
    tasksData = await res.json();
    render();
  }

  function render() {
    if (!tasksData) return;
    renderStats();
    renderWeeks();
    renderLastResearch();
  }

  function renderStats() {
    let done = 0, total = 0;
    for (const week of tasksData.weeks) {
      total += week.tasks.length;
      done += week.tasks.filter(t => t.done).length;
    }
    document.getElementById('stat-done').textContent = done;
    document.getElementById('stat-total').textContent = total;
    const pct = total ? Math.round((done / total) * 100) : 0;
    document.getElementById('progress-pct').textContent = pct + '%';
    document.getElementById('progress-fill').style.width = pct + '%';
  }

  function renderLastResearch() {
    const el = document.getElementById('last-research');
    el.textContent = tasksData.lastResearch || 'mai';
  }

  function renderWeeks() {
    const container = document.getElementById('weeks-container');
    container.innerHTML = '';

    for (const week of tasksData.weeks) {
      const doneCount = week.tasks.filter(t => t.done).length;
      const total = week.tasks.length;
      const pct = total ? Math.round((doneCount / total) * 100) : 0;

      const section = document.createElement('div');
      section.className = 'week-section';
      section.dataset.weekId = week.id;

      section.innerHTML = `
        <div class="week-header" onclick="toggleWeek('${week.id}')">
          <span class="week-chevron">&#9660;</span>
          <span class="week-label">${escHtml(week.label)}</span>
          <span class="week-dates">${escHtml(week.dates)}</span>
          <div class="week-progress">
            <span class="week-count"><b>${doneCount}/${total}</b></span>
            <div class="week-mini-bar">
              <div class="week-mini-fill" style="width:${pct}%"></div>
            </div>
          </div>
        </div>
        <div class="week-body">
          ${week.tasks.length === 0
            ? '<div class="empty-state">Nessun task in questa settimana</div>'
            : week.tasks.map(t => renderTask(t)).join('')
          }
        </div>
      `;

      container.appendChild(section);
    }
  }

  function renderTask(task) {
    const doneClass = task.done ? 'done-item' : '';
    const checkedClass = task.done ? 'checked' : '';
    const hasContent = task.content && task.content.trim().length > 0;

    return `
      <div class="task-item ${doneClass}" id="task-${escHtml(task.id)}">
        <div class="task-check ${checkedClass}" onclick="toggleTask('${escHtml(task.id)}')"></div>
        <div class="task-body">
          <div class="task-top">
            <div class="priority-dot ${escHtml(task.priority)}"></div>
            <a class="task-platform" href="${escHtml(task.url)}" target="_blank" rel="noopener">
              ${escHtml(task.platform)}
            </a>
            <span class="priority-badge ${escHtml(task.priority)}">${escHtml(task.priority)}</span>
            ${task.timing ? `<span class="task-timing">${escHtml(task.timing)}</span>` : ''}
          </div>
          ${task.notes ? `<div class="task-notes">${escHtml(task.notes)}</div>` : ''}
          ${hasContent ? `
            <div class="task-actions">
              <button class="btn-copy" onclick="copyContent('${escHtml(task.id)}')">
                &#128203; Copia testo
              </button>
            </div>
          ` : ''}
        </div>
      </div>
    `;
  }

  // ── Toggle week collapse ────────────────────────────────────────────────────
  function toggleWeek(weekId) {
    const section = document.querySelector(`[data-week-id="${weekId}"]`);
    if (section) section.classList.toggle('collapsed');
  }

  // ── Toggle task done ────────────────────────────────────────────────────────
  async function toggleTask(taskId) {
    try {
      const res = await fetch(`/api/tasks/${taskId}/toggle`, { method: 'POST' });
      if (!res.ok) throw new Error('Toggle failed');
      await loadTasks();
    } catch (err) {
      showToast('Errore nel salvataggio');
    }
  }

  // ── Copy content ────────────────────────────────────────────────────────────
  function copyContent(taskId) {
    if (!tasksData) return;
    let content = '';
    for (const week of tasksData.weeks) {
      const task = week.tasks.find(t => t.id === taskId);
      if (task) { content = task.content; break; }
    }
    if (!content) return;

    navigator.clipboard.writeText(content).then(() => {
      const btn = document.querySelector(`#task-${taskId} .btn-copy`);
      if (btn) {
        btn.classList.add('copied');
        btn.innerHTML = '&#10003; Copiato!';
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = '&#128203; Copia testo';
        }, 2000);
      }
      showToast('Testo copiato negli appunti');
    }).catch(() => {
      showToast('Errore copia — prova manualmente');
    });
  }

  // ── Research ────────────────────────────────────────────────────────────────
  async function runResearch() {
    const btn = document.getElementById('btn-research');
    const terminal = document.getElementById('terminal');

    btn.disabled = true;
    btn.innerHTML = '<span class="btn-icon">&#9881;</span> Ricerca in corso...';
    terminal.innerHTML = '';
    terminal.classList.add('visible');

    function addLine(text, cls = '') {
      const line = document.createElement('div');
      line.className = 'terminal-line' + (cls ? ' ' + cls : '');
      line.textContent = text;
      terminal.appendChild(line);
      terminal.scrollTop = terminal.scrollHeight;
    }

    addLine('$ node research.js');

    try {
      const res = await fetch('/api/research', { method: 'POST' });
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n\n');
        buffer = lines.pop();

        for (const chunk of lines) {
          for (const part of chunk.split('\n')) {
            if (part.startsWith('data: ')) {
              const text = part.slice(6);
              if (text === '__DONE__') {
                addLine('', '');
                addLine('Ricerca completata. Ricarico tasks...', 'done');
                await loadTasks();
                showToast('Ricerca completata — tasks aggiornati');
              } else if (text.includes('[stderr]') || text.includes('ERRORE')) {
                addLine(text, 'err');
              } else {
                addLine(text);
              }
            }
          }
        }
      }
    } catch (err) {
      addLine('Errore connessione: ' + err.message, 'err');
    }

    btn.disabled = false;
    btn.innerHTML = '<span class="btn-icon">&#9881;</span> Cerca nuove piattaforme';
  }

  // ── Toast ───────────────────────────────────────────────────────────────────
  let toastTimer = null;
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('visible');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('visible'), 2500);
  }

  // ── Utils ───────────────────────────────────────────────────────────────────
  function escHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  // ── Init ────────────────────────────────────────────────────────────────────
  loadTasks();
</script>
</body>
</html>
